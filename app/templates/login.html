{% extends "base.html" %}

{% block title %}Login - UAB Atendimento{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5 col-lg-4">
        <div class="card p-4">
            <header class="text-center mb-4">
                <i class="fas fa-user-circle fa-4x text-primary mb-3" aria-hidden="true"></i>
                <h1 class="h2 fw-bold">Login</h1>
                <p class="text-muted">Acesse sua conta para continuar</p>
            </header>

            {% if erro %}
                <div class="alert alert-danger d-flex align-items-center" role="alert">
                    <i class="fas fa-exclamation-circle me-2" aria-hidden="true"></i>
                    <div>{{ erro }}</div>
                </div>
            {% endif %}

            <form method="POST" aria-label="Formulário de Login">
                <div class="mb-3">
                    <label for="email" class="form-label fw-medium">E-mail</label>
                    <div class="input-group">
                        <span class="input-group-text" id="email-icon"><i class="fas fa-envelope" aria-hidden="true"></i></span>
                        <input type="email" id="email" name="email" class="form-control" placeholder="exemplo@uab.com" required aria-describedby="email-icon">
                    </div>
                </div>
                <div class="mb-4">
                    <label for="senha" class="form-label fw-medium">Senha</label>
                    <div class="input-group">
                        <span class="input-group-text" id="password-icon"><i class="fas fa-lock" aria-hidden="true"></i></span>
                        <input type="password" id="senha" name="senha" class="form-control" placeholder="Sua senha" required aria-describedby="password-icon">
                    </div>
                </div>
                <div class="d-grid">
                    <button type="submit" class="btn btn-primary btn-lg">
                        <span>Entrar</span>
                        <i class="fas fa-sign-in-alt ms-2" aria-hidden="true"></i>
                    </button>
                </div>
            </form>
        </div>
        <div class="text-center mt-4">
            <p class="text-muted small">Esqueceu sua senha? Entre em contato com o suporte.</p>
        </div>
    </div>
</div>
{% endblock %}
