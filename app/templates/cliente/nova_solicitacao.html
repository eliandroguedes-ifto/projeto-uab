{% extends "base.html" %}
{% block title %}Nova Solicitação{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="row mb-4">
            <div class="col-12">
                <h2 class="fw-bold"><i class="fas fa-plus-circle me-2"></i>Nova Solicitação</h2>
                <p class="text-muted">Descreva seu problema ou dúvida detalhadamente.</p>
            </div>
        </div>

        <div class="card p-4">
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label fw-bold">Assunto</label>
                    <input type="text" name="assunto" class="form-control" placeholder="Ex: Problema com acesso ao sistema" required>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-bold">Descrição</label>
                    <textarea name="descricao" class="form-control" rows="6" placeholder="Descreva os detalhes aqui..." required></textarea>
                </div>
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary btn-lg">
                        <i class="fas fa-paper-plane me-2"></i>Enviar Solicitação
                    </button>
                    <a href="{{ url_for('main.minhas_solicitacoes') }}" class="btn btn-outline-secondary">
                        Voltar
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
